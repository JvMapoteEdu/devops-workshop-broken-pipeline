name: CI Pipeline

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 14

      - name: Run tests
        run: npm test

      - name: Install dependencies
        run: npm install

      - name: Build project
        run: echo "Building project..."

      - name: Run lint
        run: npm run lint

      - name: Extra check
        run: npm run testtt

      - name: Deploy
        run: echo "Deploying application..."
